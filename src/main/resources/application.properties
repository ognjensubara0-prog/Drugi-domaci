quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=objektno
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/car_rental_db

# --- OVO DODAJ (OBAVEZNO) ---

# 1. ČIŠĆENJE BAZE (Samo za prvi restart, poslije vrati na 'update')
# Ovo će ti obrisati sve one duple usere i napraviti prazne tabele
quarkus.hibernate-orm.database.generation=drop-and-create

# 2. LOGOVANJE SQL-a (Da vidiš u konzoli šta se dešava)
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true

# 3. OMOGUĆAVANJE HQL KONZOLE (Da ti se otključa ono u browseru)
quarkus.hibernate-orm.dev-ui.sql-load-script-is-optional=true

# 4. SCHEDULER (Da ti proradi @Scheduled u UserService)
quarkus.scheduler.enabled=true